language: python
python:
   - "3.4"
   - "3.5"
   - "3.6"
install:
   - pip install -e .
   - pip install -r requirements/requirements_test.txt
before_script:
    flake8 wingmonkey/
script:
    pytest -v --capture=sys --cov=wingmonkey/ wingmonkey/ --cov-report term-missing:skip-covered
after_success:
    coveralls
